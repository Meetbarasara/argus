server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # proxy the platform API in prod so the SPA needs no CORS (08 #25)
  location /api/ {
    # Re-resolve `api` per request via Docker's embedded DNS (127.0.0.11). With a literal
    # hostname in proxy_pass, nginx resolves it once at worker start and caches it for the
    # worker's life — so when the api container is RECREATED (set_platform_env does exactly
    # that on every eval + demo run) it comes back on a new IP and every request 502s until
    # the ui container is restarted. A variable in proxy_pass forces resolution per request;
    # $request_uri keeps the original path+query the literal form used to pass through.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8080;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
  }

  # SPA fallback: client-side routes resolve to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
